<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pi Gateway 后台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="login-screen" id="login-screen">
      <form class="login-card" id="login-form">
        <h1>登录后台</h1>
        <label for="password">管理密码</label>
        <input id="password" name="password" type="password" autocomplete="current-password" autofocus />
        <button type="submit">登录</button>
        <p class="message" id="login-message" role="status"></p>
      </form>
    </main>

    <main class="admin-shell is-hidden" id="admin-shell">
      <aside class="sidebar">
        <div class="app-logo">
          <div class="brand-mark">Pi</div>
          <div>
            <strong>Pi Gateway</strong>
            <span>本机管理后台</span>
          </div>
        </div>
        <nav class="nav-list" aria-label="后台页面">
          <button class="nav-item is-active" type="button" data-page="sessions">会话</button>
          <button class="nav-item" type="button" data-page="models">模型</button>
          <button class="nav-item" type="button" data-page="settings">设置</button>
          <button class="nav-item" type="button" data-page="cron">定时任务</button>
          <button class="nav-item" type="button" data-page="group">群聊设置</button>
          <button class="nav-item" type="button" data-page="tools">工具</button>
          <button class="nav-item" type="button" data-page="control">控制</button>
          <button class="nav-item" type="button" data-page="skills">技能</button>
        </nav>
      </aside>

      <section class="workspace">
        <header class="target-bar">
          <div class="target-current">
            <small>当前执行目标</small>
            <strong id="current-target">未选择</strong>
          </div>
          <label class="target-select">
            <span>选择目标</span>
            <select id="target-select" aria-label="选择执行目标"></select>
          </label>
          <label class="sync-toggle">
            <input id="sync-to-feishu" type="checkbox" />
            <span>同步结果到飞书</span>
          </label>
        </header>

        <div class="content" id="content">
          <section class="page-view" id="page-sessions" data-page-view="sessions">
          <div class="page-title">
            <div>
              <h1>会话</h1>
            </div>
            <button class="button" type="button" id="refresh-button">刷新</button>
          </div>

          <div class="empty-state is-hidden" id="empty-state">请先选择私聊或群聊。</div>

          <section class="status-grid" id="session-status"></section>

          <div class="layout-stack">
            <section class="panel flush">
              <div class="panel-head padded">
                <div>
                  <h2>历史会话</h2>
                </div>
              </div>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>会话</th>
                      <th>消息</th>
                      <th>最后活动</th>
                      <th>状态</th>
                    </tr>
                  </thead>
                  <tbody id="sessions-table"></tbody>
                </table>
              </div>
            </section>

            <section class="panel">
              <div>
                <h2>已加载上下文</h2>
              </div>
              <div class="chips" id="context-files"></div>
            </section>
          </div>
          </section>

          <section class="page-view is-hidden" id="page-models" data-page-view="models">
            <div class="page-title">
              <div>
                <h1>模型</h1>
              </div>
            </div>

            <div class="layout-two">
              <section class="panel">
                <div class="panel-head">
                  <div>
                    <h2>当前模型</h2>
                  </div>
                  <label class="inline-check">
                    <input id="route-enabled" type="checkbox" />
                    <span>模型路由</span>
                  </label>
                </div>

                <div class="model-selectors">
                  <label class="model-row">
                    <span>Router</span>
                    <select id="model-router"></select>
                  </label>
                  <label class="model-row">
                    <span>Light</span>
                    <select id="model-light"></select>
                  </label>
                  <label class="model-row">
                    <span>Heavy</span>
                    <select id="model-heavy"></select>
                  </label>
                </div>
              </section>

              <section class="panel">
                <div>
                  <h2>可用模型</h2>
                </div>
                <div class="data-list" id="available-models"></div>
              </section>
            </div>
          </section>

          <section class="page-view is-hidden" id="page-settings" data-page-view="settings">
            <div class="page-title">
              <div>
                <h1>设置</h1>
              </div>
            </div>

            <div class="layout-single">
              <section class="panel">
                <div>
                  <h2>回复设置</h2>
                </div>
                <div class="setting-list">
                  <label class="setting-item">
                    <span>
                      <strong>流式回复</strong>
                      <small>回复过程中持续显示新内容</small>
                    </span>
                    <input id="setting-stream" type="checkbox" />
                  </label>
                  <label class="setting-item">
                    <span>
                      <strong>语音识别方式</strong>
                      <small>处理语音消息时使用</small>
                    </span>
                    <select id="setting-stt-provider">
                      <option value="whisper">whisper</option>
                      <option value="sensevoice">sensevoice</option>
                      <option value="doubao">doubao</option>
                    </select>
                  </label>
                  <label class="setting-item">
                    <span>
                      <strong>表情反馈</strong>
                      <small>处理消息时用表情提示状态</small>
                    </span>
                    <input id="setting-reaction" type="checkbox" />
                  </label>
                  <label class="setting-item">
                    <span>
                      <strong>工具调用展示</strong>
                      <small>回复中显示工具使用过程</small>
                    </span>
                    <select id="setting-toolcalls">
                      <option value="off">关闭</option>
                      <option value="name">只显示工具名</option>
                      <option value="full">显示详情</option>
                    </select>
                  </label>
                  <label class="setting-item">
                    <span>
                      <strong>技能目录</strong>
                      <small>新会话读取 ~/.agents/skills</small>
                    </span>
                    <input id="setting-skill-folder" type="checkbox" />
                  </label>
                </div>
              </section>
            </div>
          </section>

          <section class="page-view is-hidden" id="page-cron" data-page-view="cron">
            <div class="page-title">
              <div>
                <h1>定时任务</h1>
              </div>
              <button class="button" type="button" id="cron-refresh-button">刷新列表</button>
            </div>

            <div class="layout-single">
              <section class="panel flush">
                <div class="panel-head padded">
                  <div>
                    <h2>任务列表</h2>
                  </div>
                  <span class="badge" id="cron-count">0 个任务</span>
                </div>
                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr>
                        <th>任务</th>
                        <th>下次运行</th>
                        <th>状态</th>
                        <th>操作</th>
                      </tr>
                    </thead>
                    <tbody id="cron-table"></tbody>
                  </table>
                </div>
              </section>
            </div>
          </section>

          <section class="page-view is-hidden" id="page-group" data-page-view="group">
            <div class="page-title">
              <div>
                <h1>群聊设置</h1>
              </div>
            </div>

            <div class="layout-two">
              <section class="panel">
                <div class="panel-head">
                  <div>
                    <h2>触发规则</h2>
                  </div>
                  <span class="badge" id="group-policy-badge">未读取</span>
                </div>
                <div class="setting-list">
                  <label class="setting-item">
                    <span>
                      <strong>群聊策略</strong>
                      <small>控制哪些群可以响应消息</small>
                    </span>
                    <select id="group-policy">
                      <option value="disabled">关闭群聊响应</option>
                      <option value="allowlist">只允许白名单群</option>
                      <option value="open">允许所有群</option>
                    </select>
                  </label>
                  <label class="setting-item">
                    <span>
                      <strong>触发方式</strong>
                      <small>控制当前群里哪些消息会触发回复</small>
                    </span>
                    <select id="group-mode">
                      <option value="mention">提到机器人时响应</option>
                      <option value="all">每条消息都响应</option>
                      <option value="keyword">包含关键词时响应</option>
                    </select>
                  </label>
                </div>

                <form class="keyword-form" id="group-keyword-form">
                  <label for="group-keywords">关键词</label>
                  <div class="keyword-input-row">
                    <input id="group-keywords" type="text" autocomplete="off" placeholder="例如：日报 总结 助手" />
                    <button class="button primary" type="submit">保存关键词</button>
                  </div>
                </form>
                <div class="chips" id="group-keyword-chips"></div>
                <button class="button" type="button" id="group-keywords-clear">清空关键词</button>
              </section>

              <section class="panel">
                <div>
                  <h2>白名单</h2>
                </div>
                <div class="data-list" id="group-allowlist"></div>
                <div class="button-row">
                  <button class="button primary" type="button" id="group-allowlist-add">加入白名单</button>
                  <button class="button" type="button" id="group-allowlist-remove">移出白名单</button>
                </div>
              </section>
            </div>
          </section>

          <section class="page-view is-hidden" id="page-tools" data-page-view="tools">
            <div class="page-title">
              <div>
                <h1>工具</h1>
              </div>
            </div>

            <div class="layout-single">
              <section class="panel">
                <div class="panel-head">
                  <div>
                    <h2>工具列表</h2>
                  </div>
                  <span class="badge" id="tools-count">0 个启用</span>
                </div>
                <div class="setting-list" id="tools-list"></div>
              </section>
            </div>
          </section>

          <section class="page-view is-hidden" id="page-control" data-page-view="control">
            <div class="page-title">
              <div>
                <h1>控制</h1>
              </div>
            </div>

            <div class="layout-single">
              <section class="panel">
                <div class="panel-head">
                  <div>
                    <h2>当前状态</h2>
                  </div>
                  <span class="badge" id="control-status">未读取</span>
                </div>
                <div class="status-grid compact-grid">
                  <div class="status-cell">
                    <span>当前任务</span>
                    <strong id="control-running">--</strong>
                  </div>
                  <div class="status-cell">
                    <span>服务状态</span>
                    <strong id="control-draining">--</strong>
                  </div>
                </div>
                <div class="button-row">
                  <button class="button" type="button" id="control-stop">停止当前任务</button>
                  <button class="button" type="button" id="control-next">处理下一条</button>
                  <button class="button" type="button" id="control-restart">重启服务</button>
                </div>
              </section>
            </div>
          </section>

          <section class="page-view is-hidden" id="page-skills" data-page-view="skills">
            <div class="page-title">
              <div>
                <h1>技能</h1>
              </div>
              <button class="button" type="button" id="skills-refresh-button">刷新列表</button>
            </div>

            <div class="layout-two">
              <section class="panel">
                <div class="panel-head">
                  <div>
                    <h2>技能列表</h2>
                  </div>
                  <span class="badge" id="skills-count">0 个可用</span>
                </div>
                <div class="data-list" id="skills-list"></div>
              </section>

              <section class="panel">
                <div>
                  <h2>使用统计</h2>
                </div>
                <div class="data-list" id="skills-usage-list"></div>
              </section>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
